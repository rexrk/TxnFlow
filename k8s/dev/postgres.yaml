apiVersion: v1
kind: Secret
metadata:
  name: txnflow-postgres-secret
  namespace: txnflow
type: Opaque
stringData:
  POSTGRES_USER: txnflow
  POSTGRES_PASSWORD: txnflow_password
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: txnflow-postgres-pvc
  namespace: txnflow
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: txnflow-postgres
  namespace: txnflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: txnflow-postgres
  template:
    metadata:
      labels:
        app: txnflow-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: auth_db
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: txnflow-postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: txnflow-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: txnflow-postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: txnflow-postgres
  namespace: txnflow
spec:
  selector:
    app: txnflow-postgres
  ports:
    - port: 5432
      targetPort: 5432