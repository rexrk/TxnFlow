spring:
  application:
    name: gateway-service

  threads:
    virtual:
      enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/txnflow

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: auth-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/auth/**

            - id: wallet-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/wallets/**
server:
  port: 8081

management:
  tracing:
    sampling:
      probability: 1.0

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: false