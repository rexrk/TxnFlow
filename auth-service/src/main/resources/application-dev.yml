spring:
  application:
    name: auth-service
  web:
    resources:
      add-mappings: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KC_BASE_URL}/realms/txnflow

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: txnflow
    password: txnflow_password
    hikari:
      connection-timeout: 3000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.type.mapping: userRegisteredEvent:txnflow.authservice.dto.event.UserRegisteredEvent
      acks: "1"
      retries: 3

server:
  port: 8082
  servlet:
    context-path: /api/v1/auth

keycloak:
  server-url: ${KC_BASE_URL}
  realm: ${KC_REALM}
  client-id: ${KC_CLIENT_ID}
  client-secret: ${KC_CLIENT_SECRET}

  admin-realm: ${KC_ADMIN_REALM}
  admin-username: ${KC_ADMIN_USERNAME}
  admin-password: ${KC_ADMIN_PASSWORD}
  admin-client-id: ${KC_ADMIN_CLIENT_ID}

logging:
  level:
    org.springframework.security: debug

management:
  endpoints:
    web:
      exposure:
        include: health,info

  tracing:
    sampling:
      probability: 1.0

  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
  otlp:
    metrics:
      export:
        enabled: false